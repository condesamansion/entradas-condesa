<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta — Condesa</title>
  <link rel="icon" href="https://condesamansion.com.ar/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#333333; --text:#f1f1f1; --muted:#888; --border:#4a4a4a; }
    body { background:var(--bg); color:var(--text); font-family:'Montserrat',Arial,sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased; }

    .nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:14px 20px; background:rgba(30,30,30,.97); border-bottom:1px solid var(--border); }
    .nav-back { display:flex; align-items:center; gap:8px; color:var(--muted); text-decoration:none; font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; transition:color .15s; }
    .nav-back:hover { color:var(--text); }
    .nav-logo { height:24px; }

    .hero-band { margin-top:53px; height:38vh; min-height:200px; position:relative; overflow:hidden; background:#1a1a1a; display:flex; align-items:center; justify-content:center; }
    .hero-band-bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; filter:brightness(.4); }
    .hero-band-overlay { position:absolute; inset:0; background:linear-gradient(to bottom, transparent 30%, #333333 100%); }
    .hero-band-title { position:relative; z-index:2; font-size:clamp(36px,10vw,72px); font-weight:800; letter-spacing:-2px; }

    .content { max-width:640px; margin:0 auto; padding:40px 20px 80px; }

    /* ACCORDION */
    .producto-item { border-bottom:1px solid var(--border); }
    .producto-item:first-child { border-top:1px solid var(--border); }

    .producto-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:18px 0;
      cursor:pointer;
      gap:12px;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .producto-nombre { font-size:16px; font-weight:700; }
    .producto-arrow { color:var(--muted); transition:transform .2s; flex-shrink:0; }
    .producto-item.open .producto-arrow { transform:rotate(90deg); }

    .producto-precios { display:none; padding:0 0 20px; }
    .producto-item.open .producto-precios { display:block; }

    .precio-row {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px 0;
      border-top:1px solid rgba(74,74,74,.4);
    }
    .precio-label { font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
    .precio-valor { font-size:16px; font-weight:700; }

    .spinner { display:inline-block; width:18px; height:18px; border:2px solid rgba(241,241,241,.15); border-top-color:rgba(241,241,241,.6); border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .footer { border-top:1px solid var(--border); padding:40px 20px; display:flex; flex-direction:column; align-items:center; gap:16px; max-width:640px; margin:0 auto; }
    .footer-logo { width:50px; opacity:.12; }
    .footer-slogan { width:140px; opacity:.12; }
    .footer-copy { font-size:10px; color:#555; letter-spacing:1px; }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-back" href="/">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Inicio
  </a>
  <img class="nav-logo" src="https://condesamansion.com.ar/logohorizontal.svg" alt="Condesa">
</nav>

<div class="hero-band" id="hero-band">
  <div class="hero-band-overlay"></div>
  <div class="hero-band-title">Carta</div>
</div>

<div class="content">
  <div id="carta-wrap"><div style="text-align:center;padding:40px"><div class="spinner"></div></div></div>
</div>

<footer class="footer">
  <img class="footer-logo" src="https://condesamansion.com.ar/logo.svg" alt="Condesa">
  <img class="footer-slogan" src="https://condesamansion.com.ar/slogan.svg" alt="#LaMansionEstaDeFiesta">
  <div class="footer-copy">© Condesa · Alcira Gigena</div>
</footer>

<script>
const API       = 'https://entradas-qr-condesa.condesa.workers.dev';
const CARTA_URL = 'https://script.google.com/macros/s/AKfycbzGQLiLp14T9RKC2b4HxRFfzA81H5p1sA40Ew68yUzzezOUuvDcw4m_j4t42lQwsSTI/exec?action=getProductos';

const LABELS = {
  vaso:      'Vaso',
  jarra:     'Jarra',
  combo:     'Combo',
  lata:      'Lata',
  botellaCh: 'Botella Chica',
  botella:   'Botella',
};

async function init() {
  try {
    const [landingRes, cartaRes] = await Promise.all([
      fetch(API + '/api/landing').then(r => r.json()),
      fetch(CARTA_URL).then(r => r.json()),
    ]);

    const d   = landingRes.data || landingRes;
    const cfg = d.config || {};
    const isMobile = window.innerWidth <= 768;
    const heroUrl = isMobile
      ? (cfg.hero_url_mobile || cfg.hero_url)
      : (cfg.hero_url || cfg.hero_url_mobile);
    if (heroUrl) {
      const img = document.createElement('img');
      img.className = 'hero-band-bg';
      img.src = heroUrl;
      document.getElementById('hero-band').insertBefore(img, document.getElementById('hero-band').firstChild);
    }

    const productos = cartaRes.productos || [];
    renderCarta(productos);
  } catch(e) {
    document.getElementById('carta-wrap').innerHTML = '<div style="color:var(--muted);text-align:center;padding:40px">No se pudo cargar la carta.</div>';
  }
}

function renderCarta(productos) {
  const el = document.getElementById('carta-wrap');
  if (!productos.length) {
    el.innerHTML = '<div style="color:var(--muted);text-align:center;padding:40px">Carta no disponible.</div>';
    return;
  }

  el.innerHTML = productos.map((p, i) => {
    const precios = Object.entries(LABELS)
      .filter(([k]) => p[k] && parseFloat(p[k]) > 0)
      .map(([k, label]) => `
        <div class="precio-row">
          <span class="precio-label">${label}</span>
          <span class="precio-valor">${fmtPrecio(p[k])}</span>
        </div>`).join('');

    if (!precios) return '';

    return `
      <div class="producto-item" id="prod-${i}">
        <div class="producto-header" onclick="toggleProducto(${i})">
          <span class="producto-nombre">${esc(p.producto)}</span>
          <svg class="producto-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </div>
        <div class="producto-precios">${precios}</div>
      </div>`;
  }).join('');
}

function toggleProducto(i) {
  const item = document.getElementById(`prod-${i}`);
  const isOpen = item.classList.contains('open');
  document.querySelectorAll('.producto-item.open').forEach(el => el.classList.remove('open'));
  if (!isOpen) item.classList.add('open');
}

function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtPrecio(p) { const n=parseFloat(p); if(!n) return ''; return '$'+n.toLocaleString('es-AR',{maximumFractionDigits:0}); }

init();
</script>
</body>
</html>
