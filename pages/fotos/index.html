<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fotos — Condesa</title>
  <link rel="icon" href="https://condesamansion.com.ar/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#333333; --text:#f1f1f1; --muted:#888; --border:#4a4a4a; --surface:#2b2b2b; }
    body { background:var(--bg); color:var(--text); font-family:'Montserrat',Arial,sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased; }

    .nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:14px 20px; background:rgba(30,30,30,.97); border-bottom:1px solid var(--border); }
    .nav-back { display:flex; align-items:center; gap:8px; color:var(--muted); text-decoration:none; font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; transition:color .15s; }
    .nav-back:hover { color:var(--text); }
    .nav-logo { height:24px; }

    .hero-band { margin-top:53px; height:38vh; min-height:200px; position:relative; overflow:hidden; background:#1a1a1a; display:flex; align-items:center; justify-content:center; }
    .hero-band-bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; filter:brightness(.4); }
    .hero-band-overlay { position:absolute; inset:0; background:linear-gradient(to bottom, transparent 30%, #333333 100%); }
    .hero-band-title { position:relative; z-index:2; font-size:clamp(36px,10vw,72px); font-weight:800; letter-spacing:-2px; }

    .content { max-width:640px; margin:0 auto; padding:40px 20px 80px; }

    .albums-grid { display:grid; grid-template-columns:1fr 1fr; gap:2px; }
    @media (min-width:480px) { .albums-grid { grid-template-columns:repeat(3,1fr); } }

    .album-card { position:relative; aspect-ratio:1; overflow:hidden; background:var(--surface); display:block; text-decoration:none; }
    .album-thumb { width:100%; height:100%; object-fit:cover; transition:transform .4s ease; }
    .album-card:hover .album-thumb { transform:scale(1.05); }
    .album-overlay { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.75) 0%, transparent 60%); display:flex; align-items:flex-end; padding:12px; }
    .album-nombre { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text); line-height:1.3; }
    .album-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#2a2a2a; }
    .album-fecha {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      color: rgba(241,241,241,.55);
      margin-top: 3px;
      text-transform: uppercase;
    }

    .empty { text-align:center; padding:60px 20px; color:var(--muted); font-size:13px; }
    .spinner { display:inline-block; width:18px; height:18px; border:2px solid rgba(241,241,241,.15); border-top-color:rgba(241,241,241,.6); border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .footer { border-top:1px solid var(--border); padding:40px 20px; display:flex; flex-direction:column; align-items:center; gap:16px; max-width:640px; margin:0 auto; }
    .footer-logo { width:50px; opacity:.12; }
    .footer-slogan { width:140px; opacity:.12; }
    .footer-copy { font-size:10px; color:#555; letter-spacing:1px; }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-back" href="/">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Inicio
  </a>
  <img class="nav-logo" src="https://condesamansion.com.ar/logohorizontal.svg" alt="Condesa">
</nav>

<div class="hero-band" id="hero-band">
  <div class="hero-band-overlay"></div>
  <div class="hero-band-title">Fotos</div>
</div>

<div class="content">
  <div id="albums-wrap"><div style="text-align:center;padding:40px"><div class="spinner"></div></div></div>
</div>

<footer class="footer">
  <img class="footer-logo" src="https://condesamansion.com.ar/logo.svg" alt="Condesa">
  <img class="footer-slogan" src="https://condesamansion.com.ar/slogan.svg" alt="#LaMansionEstaDeFiesta">
  <div class="footer-copy">© Condesa · Alcira Gigena</div>
</footer>

<script>
const ALBUMS_URL = 'https://script.google.com/macros/s/AKfycbzFEegll0jVFEktgJRQzvM3d9DYjKZARsmOfnUZmU-zqszVHIqQp19-dCJ_GboyvuSs/exec';
const API = 'https://entradas-qr-condesa.condesa.workers.dev';

async function init() {
  try {
    const [landingRes] = await Promise.all([
      fetch(API + '/api/landing').then(r => r.json()),
    ]);
    const d   = landingRes.data || landingRes;
    const cfg = d.config || {};
    const isMobile = window.innerWidth <= 768;
    const heroUrl = isMobile ? (cfg.hero_url_mobile || cfg.hero_url) : (cfg.hero_url || cfg.hero_url_mobile);
    if (heroUrl) {
      const img = document.createElement('img');
      img.className = 'hero-band-bg';
      img.src = heroUrl;
      document.getElementById('hero-band').insertBefore(img, document.getElementById('hero-band').firstChild);
    }
  } catch(e) {}

  loadAlbums();
}

function loadAlbums() {
  const cbName = 'handleAlbums_' + Date.now();
  const timeout = setTimeout(() => {
    document.getElementById('albums-wrap').innerHTML = '<div class="empty">No se pudo cargar la galería.</div>';
  }, 8000);

  window[cbName] = function(albums) {
    clearTimeout(timeout);
    delete window[cbName];
    renderAlbums(Array.isArray(albums) ? albums : []);
  };

  const s = document.createElement('script');
  s.src = `${ALBUMS_URL}?callback=${cbName}&nocache=${Date.now()}`;
  s.onerror = () => {
    clearTimeout(timeout);
    document.getElementById('albums-wrap').innerHTML = '<div class="empty">Error cargando la galería.</div>';
  };
  document.body.appendChild(s);
}

function renderAlbums(albums) {
  const el = document.getElementById('albums-wrap');
  if (!albums.length) {
    el.innerHTML = '<div class="empty">Próximamente…</div>';
    return;
  }
  el.innerHTML = `<div class="albums-grid">` + albums.map(a => {
    const nombre = esc(a.title || 'Álbum');
    const fecha  = a.date ? fmtFecha(a.date) : '';
    return `
      <a class="album-card" href="${esc(a.url)}" target="_blank" rel="noopener">
        ${a.cover
          ? `<img class="album-thumb" src="${esc(a.cover)}" alt="${nombre}" loading="lazy">`
          : `<div class="album-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>`
        }
        <div class="album-overlay">
          <div>
            <div class="album-nombre">${nombre}</div>
            ${fecha ? `<div class="album-fecha">${fecha}</div>` : ''}
          </div>
        </div>
      </a>`;
  }).join('') + `</div>`;
}

function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtFecha(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.slice(0,10).split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('es-AR',{day:'numeric',month:'short',year:'numeric'});
}

init();
</script>
</body>
</html>
