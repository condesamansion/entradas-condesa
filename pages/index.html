<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Condesa</title>
  <link rel="icon" href="https://condesamansion.com.ar/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #333333;
      --text:   #f1f1f1;
      --muted:  #888;
      --border: #4a4a4a;
      --surface:#2b2b2b;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', Arial, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 20px;
      background: linear-gradient(to bottom, rgba(30,30,30,.95), transparent);
      transition: background .3s;
    }
    .nav.solid { background: rgba(30,30,30,.97); border-bottom: 1px solid var(--border); }
    .nav-links {
      display: flex;
      gap: 28px;
    }
    .nav-links a {
      color: rgba(241,241,241,.7);
      text-decoration: none;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: color .15s;
    }
    .nav-links a:hover { color: var(--text); }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100svh;
      min-height: 600px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
    }
    @media (max-width: 768px) {
      #hero-bg { display: none !important; }
    }
    @media (min-width: 769px) {
      #hero-bg-mobile { display: none !important; }
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(30,30,30,.35) 0%,
        rgba(30,30,30,.2) 40%,
        rgba(51,51,51,.7) 80%,
        #333333 100%
      );
    }
    .hero-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 0 24px;
      text-align: center;
    }
    .hero-logo { width: min(220px, 55vw); }
    .hero-slogan { width: min(200px, 50vw); opacity: .65; margin-top: 4px; }
    .hero-scroll {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: .4;
      animation: bob 2s ease-in-out infinite;
    }
    .hero-scroll span {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    @keyframes bob {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(6px); }
    }

    /* ── SECTION CARDS ── */
    .sections-wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 0;
    }

    .section-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 24px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: background .15s;
      cursor: pointer;
    }
    .section-card:first-child { border-top: 1px solid var(--border); }
    .section-card:hover { background: rgba(241,241,241,.03); }
    .section-card:active { background: rgba(241,241,241,.06); }

    .section-card-body { flex: 1; }

    .section-card-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .section-card-title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .section-card-desc {
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
    }

    .section-card-arrow {
      color: var(--muted);
      flex-shrink: 0;
      margin-left: 20px;
      transition: transform .15s, color .15s;
    }
    .section-card:hover .section-card-arrow {
      transform: translateX(4px);
      color: var(--text);
    }

    /* ── FOOTER ── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 48px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      max-width: 640px;
      margin: 0 auto;
    }
    .footer-logo { width: 60px; opacity: .15; }
    .footer-slogan { width: 160px; opacity: .15; }
    .footer-copy {
      font-size: 10px;
      color: #555;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav" id="main-nav">
  <div class="nav-links">
    <a href="/eventos">Fechas</a>
    <a href="/fotos">Fotos</a>
    <a href="/carta">Carta</a>
    <a href="/promos">Promos</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero" id="hero">
  <img id="hero-bg-mobile" class="hero-bg" src="" alt="" style="display:none">
  <img id="hero-bg" class="hero-bg" src="" alt="" style="display:none">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <img class="hero-logo" src="https://condesamansion.com.ar/logo.svg" alt="Condesa">
    <img class="hero-slogan" src="https://condesamansion.com.ar/slogan.svg" alt="#LaMansionEstaDeFiesta">
  </div>
  <div class="hero-scroll">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
    <span>Ver más</span>
  </div>
</div>

<!-- CARDS DE SECCIONES -->
<div class="sections-wrap">

  <a class="section-card" href="/eventos">
    <div class="section-card-body">
      <div class="section-card-label">01</div>
      <div class="section-card-title">Fechas</div>
      <div class="section-card-desc">Próximos eventos y entradas</div>
    </div>
    <div class="section-card-arrow">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </div>
  </a>

  <a class="section-card" href="/fotos">
    <div class="section-card-body">
      <div class="section-card-label">02</div>
      <div class="section-card-title">Fotos</div>
      <div class="section-card-desc">Álbumes de todas las fechas</div>
    </div>
    <div class="section-card-arrow">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </div>
  </a>

  <a class="section-card" href="/carta">
    <div class="section-card-body">
      <div class="section-card-label">03</div>
      <div class="section-card-title">Carta</div>
      <div class="section-card-desc">Bebidas y precios</div>
    </div>
    <div class="section-card-arrow">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </div>
  </a>

  <a class="section-card" href="/promos">
    <div class="section-card-body">
      <div class="section-card-label">04</div>
      <div class="section-card-title">Promos</div>
      <div class="section-card-desc">Ofertas y promociones vigentes</div>
    </div>
    <div class="section-card-arrow">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </div>
  </a>

</div>

<!-- FOOTER -->
<footer class="footer">
  <img class="footer-logo" src="https://condesamansion.com.ar/logo.svg" alt="Condesa">
  <img class="footer-slogan" src="https://condesamansion.com.ar/slogan.svg" alt="#LaMansionEstaDeFiesta">
  <div class="footer-copy">© Condesa · Alcira Gigena</div>
</footer>

<script>
const API = 'https://entradas-qr-condesa.condesa.workers.dev';

window.addEventListener('scroll', () => {
  document.getElementById('main-nav').classList.toggle('solid', window.scrollY > 60);
}, { passive: true });

async function init() {
  try {
    const raw  = await fetch(API + '/api/landing');
    const json = await raw.json();
    const d    = json.data || json;
    const cfg  = d.config || {};

    if (cfg.hero_url) {
      document.getElementById('hero-bg').src = cfg.hero_url;
    }
    if (cfg.hero_url_mobile) {
      document.getElementById('hero-bg-mobile').src = cfg.hero_url_mobile;
    } else if (cfg.hero_url) {
      document.getElementById('hero-bg-mobile').src = cfg.hero_url;
    }
  } catch(e) {}
}

init();
</script>
</body>
</html>
