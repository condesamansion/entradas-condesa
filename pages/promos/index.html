<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promos — Condesa</title>
  <link rel="icon" href="https://condesamansion.com.ar/favicon.svg" type="image/svg+xml">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://condesamansion.com.ar/promos">
  <meta property="og:title" content="Promos — Condesa">
  <meta property="og:description" content="Entradas, fechas, fotos y carta de bebidas. Alcira Gigena, Córdoba.">
  <meta property="og:image" content="https://assets.condesamansion.com.ar/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="es_AR">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://assets.condesamansion.com.ar/og.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://lh3.googleusercontent.com">
  <link rel="preconnect" href="https://script.google.com">
  <link rel="dns-prefetch" href="https://entradas-qr-condesa.condesa.workers.dev">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#333333; --text:#f1f1f1; --muted:#888; --border:#4a4a4a; }
    body { background:var(--bg); color:var(--text); font-family:'Montserrat',Arial,sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased; }

    .nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:14px 20px; background:rgba(30,30,30,.97); border-bottom:1px solid var(--border); }
    .nav-back { display:flex; align-items:center; gap:8px; color:var(--muted); text-decoration:none; font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; transition:color .15s; }
    .nav-back:hover { color:var(--text); }
    .nav-logo { height:24px; }

    .hero-band { margin-top:53px; height:38vh; min-height:200px; position:relative; overflow:hidden; background:#1a1a1a; display:flex; flex-direction:column; gap:0; align-items:center; justify-content:center; }
    .hero-band-bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; filter:brightness(.4); }
    .hero-band-overlay { position:absolute; inset:0; background:linear-gradient(to bottom, transparent 30%, #333333 100%); }
    .hero-band-title { position:relative; z-index:2; font-size:clamp(36px,10vw,72px); font-weight:800; letter-spacing:-2px; }
    .hero-band-slogan { position:relative; z-index:2; width:min(180px,45vw); opacity:.5; margin-top:12px; }

    .content { max-width:640px; margin:0 auto; padding:40px 20px 80px; }

    .promo-card { border:1px solid var(--border); overflow:hidden; margin-bottom:2px; }
    .promo-img { width:100%; display:block; object-fit:contain; background:#1a1a1a; }
    .promo-body { padding:20px; font-size:14px; font-weight:400; line-height:1.7; color:rgba(241,241,241,.85); }
    .no-promos { text-align:center; padding:60px 20px; color:var(--muted); font-size:12px; font-weight:600; letter-spacing:2px; text-transform:uppercase; border:1px dashed var(--border); }
    .promo-nombre { font-size:18px; font-weight:800; letter-spacing:-.3px; margin-bottom:8px; color:var(--text); }
    .btn-whatsapp { display:inline-flex; align-items:center; gap:8px; margin-top:16px; background:#25d366; color:#fff; padding:12px 20px; font-family:'Montserrat',Arial,sans-serif; font-size:12px; font-weight:700; letter-spacing:1px; text-decoration:none; transition:opacity .15s; }
    .btn-whatsapp:hover { opacity:.85; }

    .spinner { display:inline-block; width:18px; height:18px; border:2px solid rgba(241,241,241,.15); border-top-color:rgba(241,241,241,.6); border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .footer { border-top:1px solid var(--border); padding:40px 20px; display:flex; flex-direction:column; align-items:center; gap:16px; max-width:640px; margin:0 auto; }
    .footer-logo { width:50px; opacity:.12; }
    .footer-slogan { width:140px; opacity:.12; }
    .footer-copy { font-size:10px; color:#555; letter-spacing:1px; }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-back" href="/">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Inicio
  </a>
  <img class="nav-logo" src="https://condesamansion.com.ar/logohorizontal.svg" alt="Condesa">
</nav>

<div class="hero-band" id="hero-band">
  <div class="hero-band-overlay"></div>
  <div class="hero-band-title">Promos</div>
  <img class="hero-band-slogan" src="https://condesamansion.com.ar/slogan.svg" alt="#LaMansionEstaDeFiesta">
</div>

<div class="content">
  <div id="promos-wrap"><div style="text-align:center;padding:40px"><div class="spinner"></div></div></div>
</div>

<footer class="footer">
  <img class="footer-logo" src="https://condesamansion.com.ar/logo.svg" alt="Condesa">
  <img class="footer-slogan" src="https://condesamansion.com.ar/slogan.svg" alt="#LaMansionEstaDeFiesta">
  <div class="footer-copy">© Condesa · Alcira Gigena</div>
</footer>

<script>
const API = 'https://entradas-qr-condesa.condesa.workers.dev';

async function init() {
  try {
    const res = await fetch(API + '/api/landing').then(r => r.json());
    const d   = res.data || res;
    const cfg = d.config || {};

    const isMobile = window.innerWidth <= 768;
    const heroUrl = isMobile
      ? (cfg.hero_url_mobile || cfg.hero_url)
      : (cfg.hero_url || cfg.hero_url_mobile);
    if (heroUrl) {
      const img = document.createElement('img');
      img.className = 'hero-band-bg';
      img.src = heroUrl;
      document.getElementById('hero-band').insertBefore(img, document.getElementById('hero-band').firstChild);
    }

    renderPromos(d.promos || [], cfg.whatsapp_numero || '');
  } catch(e) {
    document.getElementById('promos-wrap').innerHTML = '<div class="no-promos">Error al cargar</div>';
  }
}

function renderPromos(promos, waNumero) {
  const el = document.getElementById('promos-wrap');
  if (!promos.length) {
    el.innerHTML = '<div class="no-promos">Sin promos vigentes</div>';
    return;
  }
  el.innerHTML = promos.map(p => {
    const waMsg = encodeURIComponent(`Hola, quiero averiguar por la promo: ${p.nombre || p.descripcion}`);
    const waUrl = `https://wa.me/${waNumero}?text=${waMsg}`;
    return `
      <div class="promo-card">
        ${p.imagen_url ? `<img class="promo-img" src="${esc(p.imagen_url)}" alt="Promo" loading="lazy">` : ''}
        <div class="promo-body">
          ${p.nombre ? `<div class="promo-nombre">${esc(p.nombre)}</div>` : ''}
          <div>${esc(p.descripcion)}</div>
          ${p.whatsapp && waNumero ? `
            <a class="btn-whatsapp" href="${waUrl}" target="_blank" rel="noopener">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
              Consultar por WhatsApp
            </a>` : ''}
        </div>
      </div>`;
  }).join('');
}

function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
</script>
</body>
</html>
